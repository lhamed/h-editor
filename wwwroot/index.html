<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/h-editor/" />
    <title>H-Editor | Hoheup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css?v=20260709-preview-edit-jump" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-family:sans-serif">
            <div style="text-align:center">
                <div style="font-size:1.4rem;margin-bottom:8px">H-Editor</div>
                <div style="font-size:.9rem">로딩 중...</div>
            </div>
        </div>
    </div>
    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;width:100%;padding:12px;background:#2d2d2d;color:#f44;text-align:center">
        오류가 발생했습니다. <a href="" style="color:#adf">새로고침</a>
    </div>
    <script>
        // GitHub Pages SPA 라우팅 복원
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.localStorageGet = (key) => localStorage.getItem(key);
        window.localStorageSet = (key, value) => localStorage.setItem(key, value);
        window.localStorageRemove = (key) => localStorage.removeItem(key);
        window.downloadBytes = function (filename, base64) {
            const link = document.createElement('a');
            link.href = 'data:application/octet-stream;base64,' + base64;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
        window.scrollToElementId = function (id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'nearest' });
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
